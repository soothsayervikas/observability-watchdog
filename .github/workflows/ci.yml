name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests scripts

      - name: Type check
        run: >
          mypy app/config.py app/core/url_safety.py app/core/metrics.py
          app/core/webhook_signing.py app/core/ai_cache.py app/core/exceptions.py
          app/models app/repositories

      - name: Secret scan
        run: python scripts/check_secrets.py

      - name: Test (relaxed profile)
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=70
        env:
          DATABASE_URL: sqlite:///:memory:
          APP_ENV: local
          SECURITY_PROFILE: relaxed
          AI_CLASSIFIER_ENABLED: false

  test-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test (strict profile — full suite)
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=70
        env:
          DATABASE_URL: sqlite:///:memory:
          APP_ENV: production
          SECURITY_PROFILE: strict
          API_KEY: ci-test-api-key
          WEBHOOK_HMAC_SECRET: ci-test-hmac-secret
          WEBHOOK_URL: http://1.2.3.4:8765/webhook
          AI_CLASSIFIER_ENABLED: false

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm install

      - name: Dashboard tests
        working-directory: dashboard
        run: npm test

      - name: Dashboard build
        working-directory: dashboard
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t observability-watchdog:ci .

  test-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,redis]"

      - name: Redis-backed tests
        run: pytest -q tests/unit/test_redis_features.py
        env:
          DATABASE_URL: sqlite:///:memory:
          APP_ENV: local
          SECURITY_PROFILE: relaxed
          REDIS_URL: redis://localhost:6379/0
          AI_CLASSIFIER_ENABLED: false

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build --wait

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx for smoke test
        run: pip install httpx

      - name: Docker smoke test
        run: python scripts/ci_docker_smoke.py

      - name: Stop stack
        if: always()
        run: docker compose down -v
